<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Anwar Alam</title>
    <!--
      GitHub Pages serves this file for any unmatched path (it's a static
      host with no server-side rewrites). This redirects back to index.html
      with the intended path encoded in the query string, so React Router
      can restore it — the standard fix for client-side routing on GH Pages.
      https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var pathSegmentsToKeep = 0; // root (user/org) site, not a /repo-name/ project site
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>

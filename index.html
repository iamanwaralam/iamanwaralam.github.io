<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />

    <!--
      Static fallback meta — the source of truth for what non-JS crawlers
      and link-preview bots (WhatsApp, X/Twitter, some LinkedIn fetches) see,
      since this is a client-rendered SPA with no server-side rendering.
      Every route's <SEO> component (src/components/common/SEO.tsx) overrides
      these via React 19's native metadata hoisting once JS runs — which is
      what JS-executing crawlers like Googlebot index. Keep these in sync
      with src/data/site.ts (SITE) so the un-hydrated fallback is never bare.
    -->
    <title>Anwar Alam — Full Stack Web Developer in Dubai, UAE</title>
    <meta
      name="description"
      content="Anwar Alam is a Full Stack Web Developer, Shopify & WordPress expert, and SEO specialist based in Dubai, UAE. Available for remote, hybrid, onsite, and freelance work."
    />
    <link rel="canonical" href="https://iamanwaralam.github.io/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Anwar Alam" />
    <meta property="og:title" content="Anwar Alam — Full Stack Web Developer in Dubai, UAE" />
    <meta
      property="og:description"
      content="Anwar Alam is a Full Stack Web Developer, Shopify & WordPress expert, and SEO specialist based in Dubai, UAE. Available for remote, hybrid, onsite, and freelance work."
    />
    <meta property="og:url" content="https://iamanwaralam.github.io/" />
    <meta property="og:image" content="https://iamanwaralam.github.io/og/og-image.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Anwar Alam — Full Stack Web Developer in Dubai, UAE" />
    <meta
      name="twitter:description"
      content="Anwar Alam is a Full Stack Web Developer, Shopify & WordPress expert, and SEO specialist based in Dubai, UAE. Available for remote, hybrid, onsite, and freelance work."
    />
    <meta name="twitter:image" content="https://iamanwaralam.github.io/og/og-image.jpg" />
    <meta name="twitter:creator" content="@iamanwaralam" />

    <!-- No-flash theme: apply stored/system theme before first paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var isDark = stored ? stored === 'dark' : true; // dark is the brand default
          document.documentElement.classList.toggle('dark', isDark);
        } catch (e) {}
      })();
    </script>

    <!--
      Restores the real path after GitHub Pages' 404.html redirect trick
      (see public/404.html) — must run before React Router reads the URL.
      https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
